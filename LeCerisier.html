<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Le Cerisier — Menu</title>
  <style>
    :root{--bg:#b6a4a4;--card:#c8b4b4;--soft:#d6c8c8;--text:#1b1114;--muted:#890022;--rose:#890022;--pink:#890022;--line:rgba(212,71,106,.16);--shadow:0 18px 50px rgba(90,60,70,.10)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;overflow-x:hidden}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#b6a4a4 0%,#a79292 100%);color:var(--text)}
    img{max-width:100%;display:block} button{font:inherit}
    header{padding:22px 18px 10px;max-width:1200px;margin:0 auto}
    .nav{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .logo{width:42px;height:42px;border-radius:50%;background:rgba(255,244,246,.70);display:grid;place-items:center;flex:0 0 auto;box-shadow:var(--shadow);border:1px solid rgba(212,71,106,.12);overflow:hidden}
    .logo img{width:100%;height:100%;object-fit:cover}
    .brand-name{font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:clamp(26px,3vw,34px);color:var(--rose);line-height:1}
    .menu-links{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;flex:1;color:var(--rose);font-size:18px}
    .menu-links a{color:var(--pink);text-decoration:none;opacity:.86}
    .menu-links a.active{opacity:1;font-weight:700;position:relative}
    .menu-links a.active:after{content:'';position:absolute;left:0;right:0;bottom:-8px;height:2px;background:var(--rose);border-radius:999px}
    .actions{display:flex;align-items:center;gap:14px;color:var(--pink)}
    .icon{width:34px;height:34px;display:grid;place-items:center;font-size:28px;line-height:1;color:var(--pink)}
    .icon svg{width:26px;height:26px;display:block}
    .layout{max-width:1200px;margin:0 auto;padding:6px 18px 28px;display:grid;grid-template-columns:minmax(0,1.45fr) minmax(300px,.9fr);gap:18px;align-items:start}
    .menu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .card,.cart{background:linear-gradient(180deg,var(--card),var(--soft));border:1px solid rgba(212,71,106,.10);border-radius:26px;box-shadow:var(--shadow);min-width:0;position:relative;overflow:hidden}
    .menu-item{padding-top:38px}
    .sakura{position:absolute;top:-2px;left:10px;width:124px;height:42px;pointer-events:none;opacity:.98}
    .sakura.right{left:auto;right:10px;top:auto;bottom:-6px;transform:scaleX(-1)}
    .sakura svg{width:100%;height:100%}
    .content{padding:16px 16px 18px;min-width:0}
    .title{font-size:20px;font-weight:700;margin:6px 0 6px;overflow-wrap:anywhere;color:var(--text)}
    .desc{margin:0;color:var(--muted);font-size:14px;line-height:1.5;overflow-wrap:anywhere}
    .meta{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:12px;flex-wrap:wrap}
    .price{font-size:22px;font-weight:800;color:var(--rose)}
    .btn{border:0;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer;transition:.2s ease;white-space:nowrap}
    .btn-primary{background:linear-gradient(135deg,var(--rose),#ef6f8c);color:#fff;box-shadow:0 8px 24px rgba(212,71,106,.22)}
    .btn-primary:hover{transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(212,71,106,.20)}
    .cart{position:sticky;top:18px;padding:18px;min-height:calc(100vh - 36px)}
    .cart h2,.modal h2{margin:0 0 12px;color:var(--text)}
    .cart-list{display:grid;gap:10px;margin:12px 0 16px}
    .cart-item{display:flex;justify-content:space-between;gap:10px;padding:12px;border:1px solid rgba(212,71,106,.12);border-radius:16px;background:rgba(255,248,249,.45);align-items:center;min-width:0}
    .cart-item > div:first-child{min-width:0}
    .cart-item strong,.cart-item small{overflow-wrap:anywhere}
    .cart-item small{color:var(--muted)}
    .cart-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .icon-btn{width:32px;height:32px;border-radius:10px;border:1px solid rgba(212,71,106,.20);background:#fff;color:var(--rose);cursor:pointer;flex:0 0 auto}
    .empty{color:var(--muted);border:1px dashed rgba(212,71,106,.18);padding:16px;border-radius:16px;text-align:center;background:rgba(255,255,255,.45)}
    .total{display:flex;justify-content:space-between;align-items:center;margin:10px 0 16px;font-size:18px;gap:12px}
    .total strong{color:var(--rose)}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(212,71,106,.08);border:1px solid rgba(212,71,106,.18);color:var(--rose);padding:8px 12px;border-radius:999px;font-size:13px;max-width:100%}
    .modal-backdrop{position:fixed;inset:0;background:rgba(182,164,164,.72);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
    .modal-backdrop.open{display:flex}
    .modal{width:min(920px,100%);background:linear-gradient(180deg,#d7c9c9,#c6b1b1);border:1px solid rgba(212,71,106,.12);border-radius:24px;overflow:hidden;box-shadow:0 30px 90px rgba(90,60,70,.18);position:relative;max-height:calc(100dvh - 32px);overflow:auto}
    .modal-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);min-height:420px}
    .modal-media{padding:22px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#d7c9c9,#c6b1b1)}
    .plate{width:min(100%,360px);aspect-ratio:1;border-radius:30px;background:linear-gradient(145deg,#fffafa 10%,#f8e3e6 100%);box-shadow:inset 0 0 0 1px rgba(212,71,106,.08),0 16px 40px rgba(90,60,70,.10);position:relative;overflow:hidden;max-width:100%}
    .plate:before,.plate:after{content:'';position:absolute;border-radius:50%;background:rgba(241,177,193,.22)}
    .plate:before{width:120px;height:120px;right:22px;top:22px}.plate:after{width:70px;height:70px;left:28px;bottom:28px}
    .modal-body{padding:22px;display:flex;flex-direction:column;gap:14px;min-width:0}
    .detail-price{font-size:28px;font-weight:900;color:var(--rose)}
    .qty{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .qty button{width:42px;height:42px;border-radius:12px;border:1px solid rgba(212,71,106,.18);background:#fff;color:var(--rose);font-size:20px;flex:0 0 auto}
    .qty span{min-width:28px;text-align:center;font-size:18px;font-weight:700}
    .close{position:absolute;right:14px;top:14px;width:40px;height:40px;border-radius:12px;border:1px solid rgba(212,71,106,.18);background:#fff;color:var(--rose);font-size:18px;z-index:2}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#1b1114;color:#fff;padding:12px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.08);opacity:0;pointer-events:none;transition:.25s;z-index:30;max-width:calc(100vw - 32px);text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
    .heroimg{height:170px;background-size:cover;background-position:center;background-repeat:no-repeat;filter:saturate(.9) brightness(.9)}
    .img1{background-image:url('https://images.unsplash.com/photo-1557872943-16a5ac26437e?auto=format&fit=crop&w=1200&q=80')}
    .img2{background-image:url('https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?auto=format&fit=crop&w=1200&q=80')}
    .img3{background-image:url('https://images.unsplash.com/photo-1579871494447-9811cf80d66c?auto=format&fit=crop&w=1200&q=80')}
    .img4{background-image:url('https://images.unsplash.com/photo-1611270629569-8b357cb88da9?auto=format&fit=crop&w=1200&q=80')}
    .img5{background-image:url('https://images.unsplash.com/photo-1580822184713-fc33b3d7f89d?auto=format&fit=crop&w=1200&q=80')}
    .img6{background-image:url('https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?auto=format&fit=crop&w=1200&q=80')}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.cart{position:relative;top:0;min-height:auto}.menu-grid{grid-template-columns:1fr}.modal-grid{grid-template-columns:1fr}.modal-media{min-height:240px}}
    @media (max-width:640px){header{padding:18px 14px 8px}.layout{padding:8px 14px 20px;gap:14px}.menu-grid{gap:14px}.content,.modal-body,.cart{padding:14px}.heroimg{height:150px}.meta{align-items:stretch}.meta .btn,.total .btn{width:100%}.cart-item{flex-direction:column;align-items:flex-start}.cart-actions{width:100%;justify-content:flex-start}.modal-backdrop{padding:8px}.modal{max-height:calc(100dvh - 16px);border-radius:20px}.detail-price{font-size:24px}.close{right:10px;top:10px}}
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">
        <div class="logo"><img src="LogoCerisier.png" alt="Logo Le Cerisier"></div>
        <div class="brand-name">Le Cerisier</div>
      </div>
      <nav class="menu-links" aria-label="Navigation principale">
        <a href="#">Accueil</a>
        <a href="#" class="active">Menu</a>
        <a href="#">Contact</a>
      </nav>
      <div class="actions" aria-label="Actions">
        <div class="icon" title="Compte" aria-label="Compte">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="8" r="3.25"/>
    <path d="M5 20c1.7-3.7 5-5.5 7-5.5s5.3 1.8 7 5.5"/>
  </svg>
</div>

<div class="icon" title="Panier" aria-label="Panier">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M3 4h2l2.2 10.2a2 2 0 0 0 2 1.6h7.5a2 2 0 0 0 1.9-1.4L21 8H7.2"/>
    <circle cx="10" cy="20" r="1.4"/>
    <circle cx="17" cy="20" r="1.4"/>
  </svg>
</div>
      </div>
    </div>
  </header>
  <main class="layout">
    <section><div class="menu-grid" id="menuGrid"></div></section>
    <aside class="cart">
      <h2>Panier</h2>
      <div id="cartList" class="cart-list"></div>
      <div class="total"><span>Total</span><strong id="cartTotal">0 €</strong></div>
      <button class="btn btn-primary" style="width:100%">Commander</button>
    </aside>
  </main>
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <button class="close" id="closeModal">✕</button>
      <div class="modal-grid">
        <div class="modal-media"><div class="plate"></div></div>
        <div class="modal-body">
          <div class="badge" id="modalCategory">Menu</div>
          <h2 id="modalTitle">Titre</h2>
          <p id="modalDesc" class="desc"></p>
          <div class="detail-price" id="modalPrice">0 €</div>
          <div class="qty">
            <button id="minusQty">−</button><span id="qtyValue">1</span><button id="plusQty">+</button>
          </div>
          <button class="btn btn-primary" id="addToCart">Ajouter au panier</button>
          <button class="btn btn-ghost" id="continue">Continuer les achats</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast">Ajouté au panier</div>
  <script>
    const menus=[
      {id:1,name:'Ramen Shoyu',cat:'Nouilles',price:14.9,desc:'Bouillon soja, nouilles, œuf mariné, champignons, pak choï.'},
      {id:2,name:'Sushi Mix',cat:'Sushi',price:18.9,desc:'12 pièces assorties : maki, nigiri, california et gingembre.'},
      {id:3,name:'Sashimi Saumon',cat:'Sashimi',price:17.2,desc:'Tranches de saumon frais, riz vinaigré et wasabi.'},
      {id:4,name:'Tempura Crevettes',cat:'Tempura',price:15.8,desc:'Crevettes et légumes en friture légère, sauce soja.'},
      {id:5,name:'Donburi Poulet',cat:'Donburi',price:13.7,desc:'Bol de riz japonais, poulet mariné, légumes et œuf.'},
      {id:6,name:'Okonomiyaki',cat:'Spécialité',price:12.8,desc:'Galette japonaise garnie, sauce okonomi et mayo.'}
    ];
    const cart=new Map();
    const menuGrid=document.getElementById('menuGrid');
    const cartList=document.getElementById('cartList');
    const cartTotal=document.getElementById('cartTotal');
    const backdrop=document.getElementById('modalBackdrop');
    const toast=document.getElementById('toast');
    const modalTitle=document.getElementById('modalTitle');
    const modalDesc=document.getElementById('modalDesc');
    const modalPrice=document.getElementById('modalPrice');
    const modalCategory=document.getElementById('modalCategory');
    const qtyValue=document.getElementById('qtyValue');
    let currentItem=null,qty=1;
    const eur=v=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(v);
    const showToast=msg=>{toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)};
    const openModal=item=>{currentItem=item;qty=1;qtyValue.textContent=qty;modalTitle.textContent=item.name;modalDesc.textContent=item.desc;modalPrice.textContent=eur(item.price);modalCategory.textContent=item.cat;backdrop.classList.add('open');backdrop.setAttribute('aria-hidden','false')};
    const closeModal=()=>{backdrop.classList.remove('open');backdrop.setAttribute('aria-hidden','true')};
    function renderCart(){
      cartList.innerHTML='';
      let total=0;
      if(cart.size===0) cartList.innerHTML='<div class="empty">Ton panier est vide.</div>';
      cart.forEach((v,k)=>{total+=v.price*v.qty;const el=document.createElement('div');el.className='cart-item';el.innerHTML=`<div><strong>${v.name}</strong><br><small>x${v.qty} · ${eur(v.price)}</small></div><div class="cart-actions"><strong>${eur(v.price*v.qty)}</strong><button class="icon-btn" data-dec="${k}">−</button><button class="icon-btn" data-inc="${k}">+</button><button class="icon-btn" data-rm="${k}">×</button></div>`;cartList.appendChild(el)});
      cartTotal.textContent=eur(total);
      document.querySelectorAll('[data-dec]').forEach(b=>b.onclick=()=>changeQty(+b.dataset.dec,-1));
      document.querySelectorAll('[data-inc]').forEach(b=>b.onclick=()=>changeQty(+b.dataset.inc,1));
      document.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>removeItem(+b.dataset.rm));
    }
    function changeQty(id,delta){const item=cart.get(id);if(!item)return;item.qty+=delta;if(item.qty<=0)cart.delete(id);else cart.set(id,item);renderCart()}
    function removeItem(id){cart.delete(id);renderCart()}
    function sakuraSvg(){return `<svg viewBox="0 0 220 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g><path d="M10 45c28-25 53-20 79-2 20 14 39 18 63 5 12-6 24-15 39-27" fill="none" stroke="#7a5a5f" stroke-width="3" stroke-linecap="round"/><g fill="#f1b1c1"><circle cx="72" cy="33" r="8"/><circle cx="87" cy="25" r="7"/><circle cx="104" cy="31" r="8"/><circle cx="123" cy="37" r="7"/><circle cx="139" cy="28" r="8"/><circle cx="156" cy="18" r="7"/><circle cx="57" cy="40" r="7"/><circle cx="30" cy="47" r="6"/></g><g fill="#fffafa" opacity=".9"><circle cx="72" cy="33" r="3"/><circle cx="87" cy="25" r="3"/><circle cx="104" cy="31" r="3"/><circle cx="123" cy="37" r="3"/><circle cx="139" cy="28" r="3"/><circle cx="156" cy="18" r="3"/><circle cx="57" cy="40" r="3"/><circle cx="30" cy="47" r="2.5"/></g></g></svg>`}
    function renderMenus(){
      menuGrid.innerHTML=menus.map((m,i)=>`<article class="card menu-item"><div class="sakura">${sakuraSvg()}</div><div class="heroimg img${i+1}"></div><div class="sakura right">${sakuraSvg()}</div><div class="content"><div class="badge">${m.cat}</div><h3 class="title">${m.name}</h3><p class="desc">${m.desc}</p><div class="meta"><div class="price">${eur(m.price)}</div><button class="btn btn-primary" data-id="${m.id}">Sélectionner</button></div></div></article>`).join('');
      document.querySelectorAll('[data-id]').forEach(btn=>btn.addEventListener('click',()=>openModal(menus.find(m=>m.id==btn.dataset.id))))
    }
    document.getElementById('minusQty').onclick=()=>{qty=Math.max(1,qty-1);qtyValue.textContent=qty};
    document.getElementById('plusQty').onclick=()=>{qty+=1;qtyValue.textContent=qty};
    document.getElementById('addToCart').onclick=()=>{const item=cart.get(currentItem.id)||{...currentItem,qty:0};item.qty+=qty;cart.set(currentItem.id,item);renderCart();showToast(`${currentItem.name} ajouté au panier`);closeModal()};
    document.getElementById('closeModal').onclick=closeModal;
    document.getElementById('continue').onclick=closeModal;
    backdrop.addEventListener('click',e=>{if(e.target===backdrop)closeModal()});
    renderMenus();renderCart();
  </script>
</body>
</html>
