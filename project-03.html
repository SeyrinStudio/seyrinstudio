<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio 02 — Carrousel immersif</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#c8d3e8;
  --accent:#6c63ff;
  --nav-h:60px;
  --footer-h:56px;
  --ease:600ms cubic-bezier(.16,1,.3,1);
  --panel-w:420px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',sans-serif;font-weight:300;
  color:var(--text);-webkit-tap-highlight-color:transparent;
  background:
    radial-gradient(ellipse 60% 50% at 30% 60%, rgba(108,99,255,.12), transparent 60%),
    radial-gradient(ellipse 40% 40% at 75% 20%, rgba(46,102,255,.14), transparent 50%),
    linear-gradient(180deg,#080e1c 0%,#060b16 100%);
}
a{color:inherit;text-decoration:none}
*:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}

/* ── NAV ── */
nav{
  position:fixed;inset:0 0 auto 0;height:var(--nav-h);z-index:200;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:0 2.5rem;
  background:rgba(8,14,28,.88);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-left,.nav-link,.nav-cta{font-family:'League Gothic',sans-serif;letter-spacing:.1em;text-transform:uppercase}
.nav-left{font-size:1.1rem;transition:color .2s}.nav-left:hover{color:var(--accent)}
.nav-center{display:flex;gap:.25rem}
.nav-link{font-size:1rem;color:var(--muted);padding:.35rem .9rem;border-radius:100px;transition:color .2s,background .2s}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-right{display:flex;justify-content:flex-end}
.nav-cta{font-size:1rem;padding:.4rem 1.1rem;border:1px solid rgba(255,255,255,.18);border-radius:100px;transition:border-color .2s,background .2s}
.nav-cta:hover{border-color:rgba(255,255,255,.38);background:rgba(255,255,255,.05)}
.nav-burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;margin-left:auto}
.nav-burger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
.nav-drawer{display:none;position:fixed;inset:var(--nav-h) 0 0 0;z-index:199;background:rgba(6,11,22,.97);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.nav-drawer.open{display:flex}
.nav-drawer .nav-link{font-size:1.5rem;color:var(--text)}

/* ── FOOTER ── */
footer{
  position:fixed;inset:auto 0 0 0;height:var(--footer-h);z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;
  border-top:1px solid var(--border);
  background:rgba(6,11,22,.7);backdrop-filter:blur(14px);
}
.footer-text,.footer-link{font-size:.7rem;color:var(--muted)}
.footer-links{display:flex;gap:1.25rem}
.footer-link:hover{color:var(--text)}

/* ── MAIN LAYOUT ── */
main{
  position:fixed;
  inset:var(--nav-h) 0 var(--footer-h) 0;
  display:flex;
  overflow:hidden;
}

/* ── CAROUSEL ZONE ── */
.carousel-zone{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ── SIDE PANEL ── */
.side-panel{
  width:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-left:1px solid transparent;
  background:rgba(8,14,28,.6);
  backdrop-filter:blur(32px);
  transition:width var(--ease), border-color var(--ease);
  position:relative;
  flex-shrink:0;
}
.side-panel.open{
  width:var(--panel-w);
  border-color:var(--border);
}
.side-panel-inner{
  width:var(--panel-w);
  height:100%;
  display:flex;
  flex-direction:column;
  padding:1.5rem;
  opacity:0;
  transform:translateX(20px);
  transition:opacity var(--ease), transform var(--ease);
}
.side-panel.open .side-panel-inner{
  opacity:1;
  transform:translateX(0);
  transition-delay:200ms;
}

/* Panel header */
.panel-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:1.2rem;
  flex-shrink:0;
}
.panel-kicker{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.panel-kicker::before{content:'';width:14px;height:1px;background:var(--accent);flex-shrink:0}
.panel-title{font-family:'Instrument Serif',serif;font-size:1.5rem;font-weight:400;line-height:1.15;letter-spacing:-.01em}
.panel-title .hl{font-style:italic;color:var(--accent)}
.close-btn{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);
  cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;line-height:1;
  transition:border-color .2s,background .2s,color .2s;
  margin-left:1rem;margin-top:.1rem;
}
.close-btn:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff}

/* Panel content area */
.panel-content{
  flex:1;
  min-height:0;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background:rgba(0,0,0,.25);
  border:1px solid var(--border);
}
.panel-content iframe{
  width:100%;height:100%;border:0;display:block;
}
.panel-media{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
.panel-media img,.panel-media video{
  width:100%;height:100%;object-fit:contain;border-radius:18px;background:#000;
}
.panel-media-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  color:rgba(255,255,255,.3);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;
}
.panel-media-placeholder .big-icon{font-size:3rem;opacity:.4}

/* Panel description */
.panel-desc{
  flex-shrink:0;margin-top:1rem;
  font-size:.78rem;color:var(--muted);opacity:.7;line-height:1.75;
}

/* ── CAROUSEL ── */
.carousel-stage{
  position:relative;width:100%;height:100%;
  perspective:1400px;
  display:flex;align-items:center;justify-content:center;
}
.carousel-track{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  display:flex;align-items:center;justify-content:center;
}

/* ── BACK LINK ── */
.back-link{
  position:absolute;top:1.2rem;left:2rem;z-index:10;
  display:inline-flex;gap:.5rem;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);opacity:.45;transition:opacity .2s,color .2s;
}
.back-link:hover{opacity:1;color:var(--accent)}

/* ── ITEM CARD ── */
.c-item{
  position:absolute;cursor:pointer;
  transition:all 600ms cubic-bezier(.16,1,.3,1);
  transform-style:preserve-3d;user-select:none;
}
.c-item.active .item-neon-ring{
  box-shadow:0 0 10px rgba(108,99,255,.9),0 0 28px rgba(108,99,255,.5),0 0 56px rgba(108,99,255,.25);
  border-color:rgba(108,99,255,.7);
}
.c-item:not(.active) .item-neon-ring{
  box-shadow:0 0 7px rgba(255,255,255,.75),0 0 20px rgba(255,255,255,.35),0 0 42px rgba(255,255,255,.15);
  border-color:rgba(255,255,255,.3);
}
.c-item:not(.active):hover .item-neon-ring{
  box-shadow:0 0 12px rgba(255,255,255,1),0 0 30px rgba(255,255,255,.55),0 0 60px rgba(255,255,255,.28);
  border-color:rgba(255,255,255,.7);
}
.card-item{
  width:clamp(110px,14vw,180px);aspect-ratio:3/4;border-radius:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;
  background:rgba(255,255,255,.03);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.0);
  padding:1.2rem 1rem;position:relative;overflow:hidden;
}
.card-item::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(145deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.item-neon-ring{
  position:absolute;inset:0;border-radius:22px;border:1px solid;
  pointer-events:none;transition:box-shadow 400ms ease,border-color 400ms ease;
}
.card-icon{font-size:clamp(1.8rem,3.5vw,2.8rem);line-height:1;transition:transform .3s}
.c-item:hover .card-icon{transform:scale(1.08)}
.card-title{
  font-family:'League Gothic',sans-serif;letter-spacing:.06em;text-transform:uppercase;
  font-size:clamp(.6rem,.9vw,.82rem);
  color:rgba(255,255,255,.72);text-align:center;line-height:1.3;
  text-shadow:0 0 14px rgba(255,255,255,.35);
}
.card-tag{
  position:absolute;bottom:.6rem;
  font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.25);white-space:nowrap;font-family:'DM Sans',sans-serif;
}

/* ── INFO STRIP (bottom) ── */
.info-strip{
  position:absolute;bottom:1.4rem;left:50%;transform:translateX(-50%);
  text-align:center;z-index:20;pointer-events:none;
  width:min(88vw,360px);
}
.info-strip .s-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.35rem;display:flex;align-items:center;justify-content:center;gap:.45rem}
.info-strip .s-label::before,.info-strip .s-label::after{content:'';width:16px;height:1px;background:var(--accent)}
.info-strip .i-title{font-family:'Instrument Serif',serif;font-size:clamp(.95rem,1.8vw,1.35rem);font-weight:400;letter-spacing:-.01em}
.info-strip .i-title .hl{font-style:italic;color:var(--accent)}

/* ── ARROWS ── */
.nav-arr{
  position:absolute;top:50%;z-index:30;transform:translateY(-50%);
  width:clamp(30px,3vw,44px);height:clamp(30px,3vw,44px);border-radius:50%;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .2s,background .2s,box-shadow .2s;
  color:rgba(255,255,255,.45);font-size:1rem;line-height:1;
}
.nav-arr:hover{border-color:rgba(255,255,255,.38);background:rgba(255,255,255,.07);color:#fff;box-shadow:0 0 12px rgba(255,255,255,.12)}
.nav-arr.left{left:1.2rem}
.nav-arr.right{right:1.2rem}

/* ── DOTS ── */
.dots{position:absolute;bottom:.4rem;left:50%;transform:translateX(-50%);display:flex;gap:.45rem;z-index:20}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s,transform .3s,box-shadow .3s;cursor:pointer}
.dot.active{background:#fff;transform:scale(1.3);box-shadow:0 0 6px rgba(255,255,255,.8)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  nav,footer{padding:0 1.5rem}
  :root{--panel-w:360px}
  .back-link{left:1.5rem}
  .nav-arr.left{left:.6rem}
  .nav-arr.right{right:.6rem}
}
@media(max-width:640px){
  .nav-center,.nav-right{display:none}
  .nav-burger{display:flex}
  nav{grid-template-columns:1fr auto}
  footer .footer-links{display:none}
  .side-panel.open{
    position:fixed;inset:var(--nav-h) 0 var(--footer-h) 0;
    width:100vw !important;z-index:100;border-left:none;
  }
  .back-link{left:1rem}
  .nav-arr.left{left:.3rem}
  .nav-arr.right{right:.3rem}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-left">Seyrin Studio</a>
  <div class="nav-center">
    <a href="index.html#portfolio" class="nav-link">Projets</a>
    <a href="index.html#about" class="nav-link">À propos</a>
  </div>
  <div class="nav-right">
    <a href="mailto:seyrin.cbs@gmail.com" class="nav-cta">Me contacter</a>
  </div>
  <button class="nav-burger" id="navBurger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>

<div class="nav-drawer" id="navDrawer">
  <a href="index.html#portfolio" class="nav-link" onclick="closeDrawer()">Projets</a>
  <a href="index.html#about" class="nav-link" onclick="closeDrawer()">À propos</a>
  <a href="mailto:seyrin.cbs@gmail.com" class="nav-cta" onclick="closeDrawer()">Me contacter</a>
</div>

<main>
  <div class="carousel-zone" id="carouselZone">
    <a class="back-link" href="index.html#portfolio">← Retour</a>
    <div class="carousel-stage" id="stage">
      <div class="carousel-track" id="track"></div>
      <button class="nav-arr left" id="arrLeft">&#8592;</button>
      <button class="nav-arr right" id="arrRight">&#8594;</button>
      <div class="info-strip">
        <div class="s-label" id="infoLabel">Livrable 02</div>
        <div class="i-title" id="infoTitle">Prototype <span class="hl">interactif</span></div>
      </div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="side-panel-inner">
      <div class="panel-header">
        <div>
          <div class="panel-kicker" id="panelKicker">Livrable 02</div>
          <div class="panel-title" id="panelTitle">Prototype <span class="hl">interactif</span></div>
        </div>
        <button class="close-btn" id="closeBtn" aria-label="Fermer">✕</button>
      </div>
      <div class="panel-content" id="panelContent"></div>
      <p class="panel-desc" id="panelDesc"></p>
    </div>
  </div>
</main>

<footer>
  <span class="footer-text">© 2026 — Seyrin Studio · Paris</span>
  <div class="footer-links">
    <a href="#" class="footer-link">LinkedIn</a>
    <a href="#" class="footer-link">Dribbble</a>
    <a href="mailto:seyrin.cbs@gmail.com" class="footer-link">seyrin.cbs@gmail.com</a>
  </div>
</footer>

<script>
const ITEMS = [
  {
    id:'terrain', icon:'🔍',
    cardTitle:'Enquête\nterrain',
    tag:'Livrable 01',
    info:{ label:'Livrable 01', title:'Enquête <span class="hl">terrain</span>' },
    panel:{
      type:'placeholder', icon:'🔍',
      kicker:'Livrable 01',
      title:'Enquête <span class="hl">terrain</span>',
      desc:"Analyse des usages réels sur le terrain pour comprendre les besoins des utilisateurs et poser des bases solides à la conception."
    }
  },
  {
    id:'etude', icon:'📄',
    cardTitle:'Étude de\nmarché',
    tag:'Livrable 03',
    info:{ label:'Livrable 03', title:'Étude de <span class="hl">marché</span>' },
    panel:{
      type:'placeholder', icon:'📄',
      kicker:'Livrable 03',
      title:'Étude de <span class="hl">marché</span>',
      desc:"Analyse concurrentielle et benchmarking pour identifier les opportunités et positionner le projet dans son écosystème."
    }
  },
  {
    id:'phone', icon:'📱',
    cardTitle:'Prototype\ninteractif',
    tag:'Livrable 02',
    info:{ label:'Livrable 02', title:'Prototype <span class="hl">interactif</span>' },
    panel:{
      type:'iframe', src:'https://seyrinstudio.github.io/seyrinstudio',
      kicker:'Livrable 02',
      title:'Prototype <span class="hl">interactif</span>',
      desc:"Interface mobile immersive. Naviguez librement à l'intérieur du prototype."
    }
  },
  {
    id:'pitch', icon:'📊',
    cardTitle:'Pitch Deck &\nPrésentation',
    tag:'Livrable 04',
    info:{ label:'Livrable 04', title:'Pitch Deck & <span class="hl">Présentation</span>' },
    panel:{
      type:'video', src:'Restovideo.mp4',
      kicker:'Livrable 04',
      title:'Pitch Deck & <span class="hl">Présentation</span>',
      desc:"Conception de supports de présentation percutants pour pitcher efficacement un projet devant des investisseurs ou clients."
    }
  },
  {
    id:'workflow', icon:'⚙️',
    cardTitle:'Workflow',
    tag:'Livrable 05',
    info:{ label:'Livrable 05', title:'Workflow <span class="hl">design</span>' },
    panel:{
      type:'image', src:'DashboardRH.png',
      kicker:'Livrable 05',
      title:'Workflow <span class="hl">design</span>',
      desc:"Modélisation des processus et des flux de travail pour optimiser la coordination entre équipes et outiller la conception."
    }
  },
];

/* ── STATE ── */
let current = 2;
let panelOpen = false;
let dragging = false;
let swipeStartX = 0, swipeAxis = null;

/* ── ELEMENTS ── */
const track      = document.getElementById('track');
const dotsEl     = document.getElementById('dots');
const infoLabel  = document.getElementById('infoLabel');
const infoTitle  = document.getElementById('infoTitle');
const sidePanel  = document.getElementById('sidePanel');
const panelContent = document.getElementById('panelContent');
const panelKicker  = document.getElementById('panelKicker');
const panelTitle   = document.getElementById('panelTitle');
const panelDesc    = document.getElementById('panelDesc');

/* ── BUILD DOM ── */
const elements = [];
ITEMS.forEach((item, i) => {
  const el = document.createElement('div');
  el.className = 'c-item';
  el.dataset.index = i;
  el.innerHTML = `
    <div class="card-item">
      <div class="item-neon-ring"></div>
      <div class="card-icon">${item.icon}</div>
      <div class="card-title">${item.cardTitle.replace('\n','<br>')}</div>
      <span class="card-tag">${item.tag}</span>
    </div>`;
  el.addEventListener('click', () => {
    if (dragging) return;
    if (i !== current) { goTo(i); return; }
    openPanel(i);
  });
  track.appendChild(el);
  elements.push(el);
});

ITEMS.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.addEventListener('click', () => goTo(i));
  dotsEl.appendChild(d);
});

/* ── LAYOUT ── */
function getGaps() {
  const W = window.innerWidth;
  const isMobile = W < 640;
  const isTablet = W < 900;
  const cardW = isMobile ? Math.min(W*.22,110) : isTablet ? Math.min(W*.14,155) : Math.min(W*.14,180);
  const g1 = cardW * (isMobile ? 1.1 : 1.25);
  const g2 = g1 + cardW * (isMobile ? 1.05 : 1.1);
  return { g1, g2 };
}

function layout() {
  const n = ITEMS.length;
  const { g1, g2 } = getGaps();
  const offsets = [-g2, -g1, 0, g1, g2];

  elements.forEach((el, i) => {
    let rel = ((i - current + n) % n);
    if (rel > n/2) rel -= n;
    const abs = Math.abs(rel);
    const isActive = rel === 0;
    const isVisible = abs <= 2;
    const tx = offsets[rel+2] ?? (rel > 0 ? g2+300 : -g2-300);
    const scale   = isActive ? 1   : abs===1 ? 0.65 : 0.48;
    const opacity = isActive ? 1   : abs===1 ? 0.52 : 0.25;
    const tz      = isActive ? 0   : abs===1 ? -100 : -180;
    const ry      = isActive ? 0   : rel>0   ? -16  : 16;
    const blur    = isActive ? 0   : abs===1 ? 2    : 5;

    el.classList.toggle('active', isActive);
    el.style.visibility  = isVisible ? 'visible' : 'hidden';
    el.style.transform   = `translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
    el.style.opacity     = opacity;
    el.style.filter      = blur ? `blur(${blur}px)` : 'none';
    el.style.zIndex      = isActive ? 10 : abs===1 ? 5 : 2;
    el.style.pointerEvents = isVisible ? 'auto' : 'none';
  });

  infoLabel.textContent = ITEMS[current].info.label;
  infoTitle.innerHTML   = ITEMS[current].info.title;
  dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===current));
}

/* ── NAVIGATE ── */
function goTo(idx) {
  current = ((idx % ITEMS.length) + ITEMS.length) % ITEMS.length;
  layout();
}
function prev(){ goTo(current-1); }
function next(){ goTo(current+1); }

document.getElementById('arrLeft').addEventListener('click', prev);
document.getElementById('arrRight').addEventListener('click', next);

/* ── SIDE PANEL ── */
function openPanel(idx) {
  const p = ITEMS[idx].panel;
  panelKicker.textContent = p.kicker;
  panelTitle.innerHTML    = p.title;
  panelDesc.textContent   = p.desc;

  if (p.type === 'iframe') {
    panelContent.innerHTML = `<iframe src="${p.src}" title="${p.kicker}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`;
  } else if (p.type === 'video') {
    panelContent.innerHTML = `<div class="panel-media"><video src="${p.src}" autoplay muted loop playsinline controls></video></div>`;
  } else if (p.type === 'image') {
    panelContent.innerHTML = `<div class="panel-media"><img src="${p.src}" alt="${p.kicker}" /></div>`;
  } else {
    panelContent.innerHTML = `<div class="panel-media"><div class="panel-media-placeholder"><div class="big-icon">${p.icon}</div><div>Contenu à venir</div></div></div>`;
  }

  sidePanel.classList.add('open');
  panelOpen = true;
}

function closePanel() {
  sidePanel.classList.remove('open');
  panelOpen = false;
  setTimeout(() => { panelContent.innerHTML = ''; }, 650);
}

document.getElementById('closeBtn').addEventListener('click', closePanel);

/* ── SWIPE ── */
const stage = document.getElementById('stage');
stage.addEventListener('pointerdown', e => { swipeStartX=e.clientX; swipeAxis=null; dragging=false; }, {passive:true});
stage.addEventListener('pointermove', e => {
  const dx = e.clientX - swipeStartX;
  if (!swipeAxis && Math.abs(dx) > 8) swipeAxis='x';
  if (swipeAxis==='x' && Math.abs(dx) > 14) dragging=true;
}, {passive:true});
stage.addEventListener('pointerup', e => {
  if (!dragging) return;
  const dx = e.clientX - swipeStartX;
  if (dx < -40) next();
  else if (dx > 40) prev();
  setTimeout(() => { dragging=false; }, 60);
}, {passive:true});

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft'  && !panelOpen) prev();
  if (e.key==='ArrowRight' && !panelOpen) next();
  if (e.key==='Escape'     &&  panelOpen) closePanel();
  if ((e.key==='Enter'||e.key===' ') && !panelOpen) openPanel(current);
});

/* ── NAV BURGER ── */
document.getElementById('navBurger').addEventListener('click', () => document.getElementById('navDrawer').classList.toggle('open'));
function closeDrawer(){ document.getElementById('navDrawer').classList.remove('open'); }

/* ── RESIZE ── */
let rt;
window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(layout,80); });

/* ── INIT ── */
layout();
</script>
