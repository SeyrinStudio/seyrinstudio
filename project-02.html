    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1eb;
      --bg-2: #ebe7df;
      --text: #1f1c17;
      --muted: #6f6a62;
      --line: rgba(31, 28, 23, 0.12);
      --line-2: rgba(31, 28, 23, 0.08);
      --panel: #f7f4ef;
      --panel-top: #ece8e1;
      --panel-screen: #ffffff;
      --accent: #1f1c17;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow-soft: 0 20px 60px rgba(31, 28, 23, 0.08);
      --shadow-strong: 0 28px 80px rgba(31, 28, 23, 0.16);
      --ease: 650ms cubic-bezier(.16,1,.3,1);
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,0.85), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      padding: 40px 20px 56px;
    }

    a { color: inherit; }

    :focus { outline: none; }

    :focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 4px;
      border-radius: 10px;
    }

    .wrap {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    .intro {
      max-width: 900px;
      margin: 0 auto 24px;
      text-align: left;
    }

    .intro h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .intro p {
      font-size: clamp(1rem, 1.3vw, 1.08rem);
      line-height: 1.75;
      color: var(--muted);
      max-width: 72ch;
    }

    .hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin: 28px 0 18px;
    }

    .carousel {
      position: relative;
      margin: 0 auto;
      width: min(1100px, 100%);
    }
