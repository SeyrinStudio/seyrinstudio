<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Portfolio 01 — Trois écrans (vide)</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --nav-h:60px; --footer-h:64px;
    --accent:#6c63ff; --muted:#e2e8f0; --bg1:#0a1223; --bg2:#09111f;
    --ease:780ms cubic-bezier(.16,1,.3,1);
  }
  html,body{height:100%;overflow:hidden;font-family:Inter,system-ui,Arial,sans-serif;color:#fff}
  body{
    background:
      radial-gradient(circle at 76% 18%, rgba(46,102,255,.18), transparent 28%),
      radial-gradient(circle at 66% 30%, rgba(116,147,215,.08), transparent 22%),
      linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%);
  }
  :focus-visible{outline:2px solid var(--accent);outline-offset:4px;border-radius:8px}
  nav{position:fixed;inset:0 0 auto 0;height:var(--nav-h);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2rem;background:rgba(16,30,48,.88);backdrop-filter:blur(12px);z-index:40}
  nav a{color:inherit;text-decoration:none}
  .nav-left{font-family:Instrument Serif,serif;letter-spacing:.1em}
  main{position:fixed;inset:var(--nav-h) 0 var(--footer-h) 0;overflow:hidden}
  footer{position:fixed;inset:auto 0 0 0;height:var(--footer_h);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:40;background:rgba(9,17,31,.72)}
  /* Scene */
  .scene-wrap{position:relative;height:100%;display:flex;align-items:center;justify-content:center}
  .back-button{
    position:absolute;top:22px;left:50%;transform:translateX(-50%);
    z-index:60;
    background:rgba(6,10,20,0.72);
    border:1px solid rgba(255,255,255,0.06);
    color:var(--muted);
    padding:.5rem .9rem;border-radius:12px;font-size:.95rem;
    backdrop-filter:blur(8px);
  }
  .scene{position:relative;width:100%;height:72vh;max-height:760px;perspective:1800px;perspective-origin:center 42%}
  .track{position:relative;width:100%;height:100%;transform-style:preserve-3d}
  .panel{position:absolute;top:50%;left:50%;width:min(28vw,320px);height:min(60vh,520px);transform-style:preserve-3d;transition:transform var(--ease),opacity .45s ease,filter .45s ease}
  .shell{width:100%;height:100%;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));box-shadow:0 30px 80px rgba(0,0,0,.28);position:relative}
  .topbar{height:40px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03)}
  .content{height:calc(100% - 40px);position:relative}
  /* States */
  .is-center{transform:translate(-50%,-50%) translateZ(140px) rotateY(0) scale(1);z-index:30;opacity:1;filter:brightness(1)}
  .is-left{transform:translate(-155%,-50%) translateZ(-40px) rotateY(42deg) scale(.82);z-index:20;opacity:.7;filter:brightness(.58)}
  .is-right{transform:translate(55%,-50%) translateZ(-40px) rotateY(-42deg) scale(.82);z-index:20;opacity:.7;filter:brightness(.58)}
  .is-hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) translateZ(-320px) scale(.7)}
  /* hit area for side panels */
  .hit{position:absolute;inset:0;background:transparent;border:0;display:none;cursor:pointer;z-index:35}
  .is-left .hit,.is-right .hit{display:block}
  /* Controls */
  .controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;z-index:55}
  .arrow{width:44px;height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer}
  .dots{display:flex;gap:10px}
  .dot{width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:0;cursor:pointer}
  .dot[aria-current="true"]{width:24px;background:var(--accent)}
  /* responsive */
  @media (max-width:820px){.scene{height:64vh}.panel{width:74vw;height:420px}.is-left{transform:translate(-128%,-50%) translateZ(-40px) rotateY(46deg) scale(.78)}.is-right{transform:translate(28%,-50%) translateZ(-40px) rotateY(-46deg) scale(.78)}}
</style>
</head>
<body>
  <nav>
    <div class="nav-left">Seyrin Studio</div>
    <div class="nav-center"></div>
    <div class="nav-right"><a href="mailto:seyrin.cbs@gmail.com">Me contacter</a></div>
  </nav>

  <main>
    <div class="scene-wrap">
      <!-- Back link placed visually above the screens -->
      <a class="back-button" href="index.html#portfolio">← Retour aux projets</a>

      <div class="scene" aria-label="Trois écrans incurvés">
        <div class="track" id="track">
          <article class="panel" data-index="0">
            <div class="shell">
              <div class="topbar"><div style="width:10px;height:10px;border-radius:50%;background:#ff5f57;margin-right:8px"></div><div style="font-size:.78rem;color:rgba(255,255,255,.6)">écran 1</div></div>
              <div class="content" aria-hidden="true"></div>
              <button class="hit" type="button" aria-label="Ramener écran 1 au centre"></button>
            </div>
          </article>

          <article class="panel" data-index="1">
            <div class="shell">
              <div class="topbar"><div style="width:10px;height:10px;border-radius:50%;background:#febc2e;margin-right:8px"></div><div style="font-size:.78rem;color:rgba(255,255,255,.6)">écran 2</div></div>
              <div class="content" aria-hidden="true"></div>
              <button class="hit" type="button" aria-label="Ramener écran 2 au centre"></button>
            </div>
          </article>

          <article class="panel" data-index="2">
            <div class="shell">
              <div class="topbar"><div style="width:10px;height:10px;border-radius:50%;background:#28c840;margin-right:8px"></div><div style="font-size:.78rem;color:rgba(255,255,255,.6)">écran 3</div></div>
              <div class="content" aria-hidden="true"></div>
              <button class="hit" type="button" aria-label="Ramener écran 3 au centre"></button>
            </div>
          </article>
        </div>
      </div>

      <div class="controls" role="tablist" aria-label="Navigation écrans">
        <button class="arrow" id="prev" aria-label="Précédent">‹</button>
        <div class="dots" id="dots" role="tablist" aria-label="Pages"></div>
        <button class="arrow" id="next" aria-label="Suivant">›</button>
      </div>
    </div>
  </main>

  <footer><span style="opacity:.7">© 2026 — Seyrin Studio · Paris</span></footer>

<script>
  const panels = Array.from(document.querySelectorAll('.panel'));
  const dotsWrap = document.getElementById('dots');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  let current = 1;

  function renderDots(){
    dotsWrap.innerHTML = '';
    panels.forEach((p,i)=>{
      const b = document.createElement('button');
      b.className = 'dot';
      b.type = 'button';
      b.setAttribute('aria-label', `Aller à l'écran ${i+1}`);
      b.setAttribute('aria-current', i===current ? 'true' : 'false');
      b.addEventListener('click', ()=> goTo(i));
      dotsWrap.appendChild(b);
    });
  }

  function update(){
    panels.forEach((p,i)=>{
      p.classList.remove('is-left','is-center','is-right','is-hidden');
      if(i===current) p.classList.add('is-center');
      else if(i === (current + 2) % 3) p.classList.add('is-left');
      else if(i === (current + 1) % 3) p.classList.add('is-right');
      else p.classList.add('is-hidden');
    });
    [...dotsWrap.children].forEach((d,i)=>d.setAttribute('aria-current', i===current ? 'true' : 'false'));
  }

  function goTo(i){
    current = (i + panels.length) % panels.length;
    update();
  }

  prev.addEventListener('click', ()=> goTo(current - 1));
  next.addEventListener('click', ()=> goTo(current + 1));
  panels.forEach(p => p.querySelector('.hit').addEventListener('click', ()=> goTo(Number(p.dataset.index))));
  document.addEventListener('keydown', e => {
    const tag = document.activeElement?.tagName?.toLowerCase();
    if(['input','textarea','select'].includes(tag)) return;
    if(e.key === 'ArrowLeft') goTo(current - 1);
    if(e.key === 'ArrowRight') goTo(current + 1);
  });

  renderDots();
  update();
</script>
</body>
</html>
