<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projet 01 — Site web · Portfolio</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --muted: #e2e8f0;
  --accent: #6c63ff;
  --nav-h: 60px;
  --footer-h: 64px;
}

html, body { height:100%; overflow:hidden; }

body {
  font-family:'Inter',sans-serif;
  font-weight:300;
  color:var(--text);
  background:
    radial-gradient(circle at 76% 18%, rgba(46,102,255,.18), transparent 28%),
    radial-gradient(circle at 66% 30%, rgba(116,147,215,.08), transparent 22%),
    linear-gradient(180deg, #0a1223 0%, #09111f 100%);
}

a { color:inherit; text-decoration:none; }

nav {
  position:fixed; inset:0 0 auto 0;
  height:var(--nav-h); z-index:200;
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; padding:0 2.5rem;
  background:rgba(16,30,48,0.88); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}

.nav-left, .nav-link, .nav-cta {
  font-family:'League Gothic',sans-serif;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.nav-left { font-size:1.1rem; }
.nav-center { display:flex; gap:0.25rem; }
.nav-link {
  font-size:1rem;
  color:var(--muted);
  padding:0.35rem 0.9rem;
  border-radius:100px;
}
.nav-right { display:flex; justify-content:flex-end; }
.nav-cta {
  font-size:1rem;
  padding:0.4rem 1.1rem;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:100px;
}

footer {
  position:fixed; inset:auto 0 0 0;
  height:var(--footer-h); z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2.5rem;
  border-top:1px solid var(--border);
  background:rgba(9,17,31,0.72); backdrop-filter:blur(12px);
}

.footer-text, .footer-link { font-size:0.72rem; color:var(--muted); }
.footer-links { display:flex; gap:1.25rem; }

main {
  position:fixed;
  inset:var(--nav-h) 0 var(--footer-h) 0;
  overflow:hidden;
}

/* Halos de fond */
.bg-layer {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
