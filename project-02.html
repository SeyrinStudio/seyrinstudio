<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio 01 — Trois écrans</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--border:rgba(255,255,255,.08);--text:#fff;--muted:#e2e8f0;--accent:#6c63ff;--nav-h:60px;--footer-h:64px;--ease:780ms cubic-bezier(.16,1,.3,1)}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',sans-serif;font-weight:300;color:var(--text);-webkit-tap-highlight-color:transparent;background:radial-gradient(circle at 76% 18%, rgba(46,102,255,.18), transparent 28%),radial-gradient(circle at 66% 30%, rgba(116,147,215,.08), transparent 22%),linear-gradient(180deg,#0a1223 0%,#09111f 100%)}
  a{color:inherit;text-decoration:none}
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:10px}
  nav{position:fixed;inset:0 0 auto 0;height:var(--nav-h);z-index:200;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 2.5rem;background:rgba(16,30,48,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .nav-left,.nav-link,.nav-cta{font-family:'League Gothic',sans-serif;letter-spacing:.1em;text-transform:uppercase}
  .nav-left{font-size:1.1rem;color:var(--text)}
  .nav-center{display:flex;gap:.25rem}
  .nav-link{font-size:1rem;color:var(--muted);padding:.35rem .9rem;border-radius:100px;transition:color .18s,background .18s}
  .nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
  .nav-right{display:flex;justify-content:flex-end}
  .nav-cta{font-size:1rem;padding:.4rem 1.1rem;border:1px solid rgba(255,255,255,.2);border-radius:100px;transition:border-color .18s,background .18s}
  .nav-cta:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
  footer{position:fixed;inset:auto 0 0 0;height:var(--footer-h);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;border-top:1px solid var(--border);background:rgba(9,17,31,.72);backdrop-filter:blur(12px)}
  .footer-text,.footer-link{font-size:.72rem;color:var(--muted)}
  .footer-links{display:flex;gap:1.25rem}.footer-link:hover{color:var(--text)}
  main{position:fixed;inset:var(--nav-h) 0 var(--footer-h) 0;overflow:hidden}
  .bg-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .halo{position:absolute;border-radius:50%;border:1px solid rgba(108,99,255,.07);animation:haloBreath 5s ease-in-out infinite}
  .halo-1{width:min(96vw,960px);height:min(96vw,960px)}
  .halo-2{width:min(104vw,1040px);height:min(104vw,1040px);animation-delay:1.5s}
  @keyframes haloBreath{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.015)}}
  .screen-scene{position:absolute;inset:0;perspective:1800px;perspective-origin:center 48%;overflow:hidden}
  .screen-track{position:relative;width:100%;height:100%;transform-style:preserve-3d}
  .screen-panel{position:absolute;top:50%;left:50%;width:min(28vw,320px);height:min(60vh,520px);transform-style:preserve-3d;transition:transform var(--ease),opacity 480ms ease,filter 480ms ease}
  .screen-shell{position:relative;width:100%;height:100%;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.028));backdrop-filter:blur(12px);box-shadow:0 30px 80px rgba(0,0,0,.25)}
  .screen-topbar{height:40px;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
  .dots-mac{display:flex;gap:6px}.dots-mac span{width:9px;height:9px;border-radius:50%;display:block}.dots-mac span:nth-child(1){background:#ff5f57}.dots-mac span:nth-child(2){background:#febc2e}.dots-mac span:nth-child(3){background:#28c840}
  .screen-url{font-size:.72rem;color:rgba(255,255,255,.45)}
  .screen-content{height:calc(100% - 40px);position:relative;background:radial-gradient(circle at 50% 18%, rgba(108,99,255,.09), transparent 34%),linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,.012))}
  .screen-content::after{content:'';position:absolute;inset:14px;border-radius:18px;border:1px dashed rgba(255,255,255,.08);background:rgba(255,255,255,.01)}
  .screen-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,11,20,.02),rgba(7,11,20,.14));pointer-events:none;transition:opacity var(--ease),background var(--ease)}
  .screen-hit{position:absolute;inset:0;z-index:5;background:transparent;border:none;cursor:pointer;display:none}
  .screen-panel.is-center{transform:translate(-50%,-50%) translateZ(140px) rotateY(0deg) scale(1);z-index:3;opacity:1;filter:brightness(1)}
  .screen-panel.is-center .screen-overlay{opacity:0}.screen-panel.is-center .screen-hit{display:none}
  .screen-panel.is-left{transform:translate(-155%,-50%) translateZ(-40px) rotateY(42deg) scale(.82);z-index:2;opacity:.72;filter:brightness(.58)}
  .screen-panel.is-left .screen-hit{display:block}
  .screen-panel.is-right{transform:translate(55%,-50%) translateZ(-40px) rotateY(-42deg) scale(.82);z-index:2;opacity:.72;filter:brightness(.58)}
  .screen-panel.is-right .screen-hit{display:block}
  .screen-panel.is-hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) translateZ(-260px) scale(.7)}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;padding:2rem 4rem;pointer-events:none;z-index:10}
  .back-link{position:absolute;left:4rem;top:1.1rem;display:inline-flex;gap:.5rem;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.7;pointer-events:auto;z-index:20;transition:opacity .18s,color .18s}
  .back-link:hover{opacity:1;color:var(--accent)}
  .slide-nav{position:absolute;left:50%;bottom:2rem;transform:translateX(-50%);display:flex;align-items:center;gap:.85rem;pointer-events:auto;z-index:20}
  .nav-arrow{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:.95rem;transition:border-color .18s,color .18s,background .18s}
  .nav-arrow:hover{border-color:rgba(255,255,255,.3);color:var(--text);background:rgba(255,255,255,.05)}
  .slide-counter{font-family:'Instrument Serif',serif;font-style:italic;font-size:.88rem;color:rgba(255,255,255,.35)}
  .slide-counter em{color:var(--accent);font-style:normal}
  @media (max-width:768px){nav,footer{padding:0 1rem}.back-link{left:1rem}.overlay{padding:1rem;align-items:flex-end}.screen-panel{width:220px;height:400px}.screen-panel.is-left{transform:translate(-128%,-50%) translateZ(-40px) rotateY(42deg) scale(.76)}.screen-panel.is-right{transform:translate(28%,-50%) translateZ(-40px) rotateY(-42deg) scale(.76)}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-left">Seyrin Studio</a>
  <div class="nav-center">
    <a href="index.html#portfolio" class="nav-link">Projets</a>
    <a href="index.html#about" class="nav-link">À propos</a>
  </div>
  <div class="nav-right">
    <a href="mailto:seyrin.cbs@gmail.com" class="nav-cta">Me contacter</a>
  </div>
</nav>
<main>
  <div class="bg-layer">
    <div class="halo halo-1"></div>
    <div class="halo halo-2"></div>
  </div>
  <div class="screen-scene">
    <div class="screen-track">
      <article class="screen-panel" data-index="0">
        <div class="screen-shell">
          <div class="screen-topbar"><div class="dots-mac"><span></span><span></span><span></span></div><div class="screen-url">index.html</div></div>
          <div class="screen-content">
            <iframe src="index.html" title="Interface du premier écran" style="width:100%;height:100%;border:0;position:relative;z-index:1;background:#fff"></iframe>
          </div>
          <div class="screen-overlay"></div>
          <button class="screen-hit" type="button" aria-label="Ramener cet écran au centre"></button>
        </div>
      </article>
      <article class="screen-panel" data-index="1">
        <div class="screen-shell">
          <div class="screen-topbar"><div class="dots-mac"><span></span><span></span><span></span></div><div class="screen-url">écran-02</div></div>
          <div class="screen-content"></div>
          <div class="screen-overlay"></div>
          <button class="screen-hit" type="button" aria-label="Ramener cet écran au centre"></button>
        </div>
      </article>
      <article class="screen-panel" data-index="2">
        <div class="screen-shell">
          <div class="screen-topbar"><div class="dots-mac"><span></span><span></span><span></span></div><div class="screen-url">écran-03</div></div>
          <div class="screen-content"></div>
          <div class="screen-overlay"></div>
          <button class="screen-hit" type="button" aria-label="Ramener cet écran au centre"></button>
        </div>
      </article>
    </div>
  </div>
  <div class="overlay">
    <a class="back-link" href="index.html#portfolio">← Retour aux projets</a>
    <div class="slide-nav" aria-label="Navigation écrans">
      <button class="nav-arrow" id="prevBtn" type="button" aria-label="Écran précédent">←</button>
      <button class="nav-arrow" id="nextBtn" type="button" aria-label="Écran suivant">→</button>
      <div class="slide-counter"><em id="curNum">1</em> / <span id="totalNum">3</span></div>
    </div>
  </div>
</main>
<footer>
  <span class="footer-text">© 2026 — Seyrin Studio · Paris</span>
  <div class="footer-links"><a href="#" class="footer-link">LinkedIn</a><a href="#" class="footer-link">Dribbble</a><a href="mailto:seyrin.cbs@gmail.com" class="footer-link">seyrin.cbs@gmail.com</a></div>
</footer>
<script>
const panels=[...document.querySelectorAll('.screen-panel')];
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const curNumEl=document.getElementById('curNum');
const totalNumEl=document.getElementById('totalNum');
let current=0;
totalNumEl.textContent=panels.length;
function update(){
  curNumEl.textContent=current+1;
  panels.forEach((p,i)=>{p.classList.remove('is-left','is-center','is-right','is-hidden');if(i===current)p.classList.add('is-center');else if(i===(current+2)%3)p.classList.add('is-left');else if(i===(current+1)%3)p.classList.add('is-right');else p.classList.add('is-hidden');});
}
function goTo(i){current=(i+panels.length)%panels.length;update();}
prevBtn.addEventListener('click',()=>goTo(current-1));
nextBtn.addEventListener('click',()=>goTo(current+1));
panels.forEach(p=>p.querySelector('.screen-hit').addEventListener('click',()=>goTo(Number(p.dataset.index))));
document.addEventListener('keydown',e=>{const tag=document.activeElement?.tagName?.toLowerCase();if(['input','textarea','select'].includes(tag))return;if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);});
update();
</script>
</body>
</html>
